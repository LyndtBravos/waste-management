<h2>Recycling Bins</h2>

<button mat-raised-button color="primary" (click)="openCreateForm()">
  Add Bin
</button>

<br><br>

<mat-form-field appearance="outline">
  <mat-label>Search bins</mat-label>
  <input matInput (keyup)="applyFilter($event)">
</mat-form-field>

<br><br>

<button mat-raised-button color="accent" (click)="toggleMap()">
  {{ viewMap ? 'Show Table' : 'Show Map' }}
</button>

<div *ngIf="viewMap" id="binsMap" style="height: 500px; margin-top: 20px;"></div>

<div *ngIf="!viewMap">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let bin">{{bin.id}}</td>
    </ng-container>

    <ng-container matColumnDef="locationName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Location</th>
        <td mat-cell *matCellDef="let bin">{{bin.locationName}}</td>
    </ng-container>

    <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Address</th>
        <td mat-cell *matCellDef="let bin">{{bin.address}}</td>
    </ng-container>

    <ng-container matColumnDef="latitude">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Lat</th>
        <td mat-cell *matCellDef="let bin">{{bin.latitude}}</td>
    </ng-container>

    <ng-container matColumnDef="longitude">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Lng</th>
        <td mat-cell *matCellDef="let bin">{{bin.longitude}}</td>
    </ng-container>

    <ng-container matColumnDef="wasteTypesAccepted">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Waste Types</th>
        <td mat-cell *matCellDef="let bin">{{bin.wasteTypesAccepted}}</td>
    </ng-container>

    <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef>Actions</th>

        <td mat-cell *matCellDef="let bin">

        <button mat-button color="primary"
                (click)="openEditForm(bin)">
            Edit
        </button>

        <button mat-button color="warn"
                (click)="deleteBin(bin.id)">
            Delete
        </button>

        </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
        [pageSize]="5"
        [pageSizeOptions]="[5, 10, 20, 50, 100]"
        (page)="savePageSize($event)">
    </mat-paginator>

</div>
<div *ngIf="showForm" class="bin-form">

  <h3>{{ editing ? 'Edit Bin' : 'Add Bin' }}</h3>

  <mat-form-field appearance="outline">
    <mat-label>Location Name</mat-label>
    <input matInput [(ngModel)]="currentBin.locationName">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Address</mat-label>
    <input matInput [(ngModel)]="currentBin.address">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Latitude</mat-label>
    <input matInput type="number" [(ngModel)]="currentBin.latitude">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Longitude</mat-label>
    <input matInput type="number" [(ngModel)]="currentBin.longitude">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Waste Types</mat-label>
    <input matInput [(ngModel)]="currentBin.wasteTypesAccepted">
  </mat-form-field>

  <br>

  <button mat-raised-button color="primary" (click)="saveBin()">
    Save
  </button>

  <button mat-button (click)="showForm = false">
    Cancel
  </button>
</div>
