<h2 mat-dialog-title>
  {{ data.id ? 'Edit Waste Record' : 'Add Waste Record' }}
</h2>

<div mat-dialog-content>

  <mat-form-field appearance="outline">
    <mat-label>Waste Type</mat-label>
    <input matInput [(ngModel)]="data.wasteType">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Quantity</mat-label>
    <input matInput type="number" [(ngModel)]="data.quantity">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Date</mat-label>
    <input matInput type="date" [(ngModel)]="data.disposalDate">
  </mat-form-field>
</div>

<div mat-dialog-actions>

  <button mat-button (click)="cancel()">Cancel</button>

  <button mat-raised-button color="primary" (click)="save()">
    Save
  </button>
</div>
